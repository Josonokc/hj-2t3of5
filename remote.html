<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<link rel="manifest" href="manifest.webmanifest">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1115">
<title>Remote Update — Training</title>
<style>
  :root{--bg:#0f1115;--surface:#171a21;--surface2:#1e222b;--line:#2a2f3a;--text:#e6e8ec;--muted:#9aa3b2;--accent:#16c79a;--accent2:#3da9fc;--warn:#ffb454;--radius:14px}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto;padding:0 calc(18px + env(safe-area-inset-left,0px)) calc(48px + env(safe-area-inset-bottom,0px))}
  header{padding:calc(36px + env(safe-area-inset-top,0px)) 0 20px}
  h1{margin:0 0 4px;font-size:1.35rem}
  .sub{color:var(--muted);font-size:.88rem;margin:0 0 24px}
  .back{display:inline-flex;align-items:center;gap:5px;color:var(--muted);font-size:.85rem;text-decoration:none;margin-bottom:16px}
  .back:hover{color:var(--text)}
  label{display:block;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin:0 0 6px}
  input,textarea{display:block;width:100%;background:var(--surface);border:1px solid var(--line);border-radius:10px;color:var(--text);font-size:.95rem;padding:10px 12px;font-family:inherit;outline:none;-webkit-appearance:none;transition:border-color .15s}
  input:focus,textarea:focus{border-color:var(--accent2)}
  textarea{resize:vertical;min-height:90px}
  .field{margin-bottom:18px}
  .templates{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
  .tpl{background:var(--surface2);border:1px solid var(--line);border-radius:999px;color:var(--muted);font-size:.78rem;padding:4px 12px;cursor:pointer;font-family:inherit;transition:border-color .1s,color .1s}
  .tpl:hover{border-color:var(--accent2);color:var(--text)}
  .tpl:active{background:var(--line)}
  .btn{display:block;width:100%;background:var(--accent2);color:#0a0d13;border:none;border-radius:12px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:20px;font-family:inherit;transition:opacity .1s}
  .btn:active{opacity:.8}
  .btn:disabled{opacity:.4;cursor:default}
  .confirm{display:none;margin-top:16px;background:#16c79a1a;border:1px solid #16c79a55;border-radius:var(--radius);padding:13px 16px;color:var(--accent);font-size:.92rem;text-align:center}
  .setup-warn{background:#ffb4541a;border:1px solid #ffb45455;border-radius:var(--radius);padding:12px 15px;color:#ffd9a0;font-size:.86rem;margin-bottom:20px;display:none}
  .setup-warn code{background:var(--surface2);padding:1px 5px;border-radius:4px;font-size:.85em}
  .divider{border:none;border-top:1px solid var(--line);margin:28px 0}
  .history h2{font-size:.88rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin:0 0 12px}
  .hist-item{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 13px;margin:7px 0}
  .hi-from{font-weight:700;color:var(--accent2)}
  .hi-ts{color:var(--muted);font-size:.75rem;margin-left:5px}
  .hi-text{margin-top:4px;font-size:.88rem;color:var(--text)}
  .re-use{background:none;border:1px solid var(--line);border-radius:6px;color:var(--muted);font-size:.76rem;padding:3px 9px;cursor:pointer;margin-top:7px;font-family:inherit}
  .re-use:hover{border-color:var(--accent2);color:var(--text)}
  .char-count{font-size:.75rem;color:var(--muted);text-align:right;margin-top:4px}
  .char-count.warn{color:var(--warn)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a class="back" href="index.html">‹ Hub</a>
    <h1>📣 Remote Update</h1>
    <p class="sub">Message your partner — appears on their next page load.</p>
  </header>

  <div class="setup-warn" id="setup-warn">
    Firebase not configured yet. Fill in <code>firebase-config.js</code> and push to enable sending.
  </div>

  <div class="field">
    <label>From</label>
    <input type="text" id="from" placeholder="Your name" maxlength="30" autocomplete="name">
  </div>

  <div class="field">
    <label>Message</label>
    <textarea id="msg" placeholder="e.g. Skipping Lower today — rest the back." maxlength="280"></textarea>
    <div class="char-count" id="char-count">0 / 280</div>
    <div class="templates">
      <button class="tpl" data-t="Skipping today — rest day 🛌">Rest day</button>
      <button class="tpl" data-t="Moving session to tomorrow.">Shift to tomorrow</button>
      <button class="tpl" data-t="Back flaring — upper only today.">Back flare</button>
      <button class="tpl" data-t="Long run done ✅ — how'd yours go?">Long run ✓</button>
      <button class="tpl" data-t="Hyrox class is on — meet at AF D'Arena.">Hyrox on</button>
      <button class="tpl" data-t="Check the updated meal plan.">Meals update</button>
      <button class="tpl" data-t="Deload week — cut volume ~40% across all sessions.">Deload</button>
    </div>
  </div>

  <button class="btn" id="send-btn">Send →</button>
  <div class="confirm" id="confirm">✓ Sent — your partner will see it on next load.</div>

  <hr class="divider">
  <div id="history"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
(function(){
  var fromEl=document.getElementById('from'),
      msgEl=document.getElementById('msg'),
      charCount=document.getElementById('char-count'),
      sendBtn=document.getElementById('send-btn'),
      confirmEl=document.getElementById('confirm'),
      histDiv=document.getElementById('history');

  // Device ID — used to skip showing your own messages on other pages
  var myId=localStorage.getItem('rc_deviceId');
  if(!myId){myId=Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem('rc_deviceId',myId);}

  var warnEl=document.getElementById('setup-warn');
  function showErr(msg){warnEl.textContent=msg;warnEl.style.display='block';sendBtn.disabled=true;}

  // Check Firebase SDK loaded
  if(typeof firebase==='undefined'){showErr('Firebase SDK failed to load — check your internet connection and reload.');return;}

  // Check config
  if(typeof FIREBASE_CONFIG==='undefined'||FIREBASE_CONFIG.apiKey==='REPLACE_ME'){
    showErr('Firebase not configured. Fill in firebase-config.js with your project values and push.');
    return;
  }

  var db;
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.database();
  }catch(e){
    showErr('Firebase init failed: '+e.message);
    return;
  }

  var saved=localStorage.getItem('rc_from');
  if(saved) fromEl.value=saved;

  msgEl.addEventListener('input',function(){
    var n=msgEl.value.length;
    charCount.textContent=n+' / 280';
    charCount.classList.toggle('warn',n>240);
  });

  document.querySelectorAll('.tpl').forEach(function(t){
    t.addEventListener('click',function(){
      msgEl.value=t.dataset.t;
      msgEl.dispatchEvent(new Event('input'));
      msgEl.focus();
    });
  });

  sendBtn.addEventListener('click',function(){
    var from=fromEl.value.trim();
    var text=msgEl.value.trim();
    if(!text){msgEl.focus();return;}
    if(from) localStorage.setItem('rc_from',from);

    sendBtn.disabled=true;
    sendBtn.textContent='Sending…';
    confirmEl.style.display='none';

    var data={from:from,text:text,ts:Date.now(),deviceId:myId};
    db.ref('messages').push(data)
      .then(function(){
        sendBtn.disabled=false;
        sendBtn.textContent='Send →';
        confirmEl.style.display='block';
        msgEl.value='';
        msgEl.dispatchEvent(new Event('input'));

        var hist=JSON.parse(localStorage.getItem('rc_sent')||'[]');
        hist.unshift({from:from,text:text,ts:data.ts});
        if(hist.length>10) hist=hist.slice(0,10);
        localStorage.setItem('rc_sent',JSON.stringify(hist));
        renderHistory();
      })
      .catch(function(err){
        sendBtn.disabled=false;
        sendBtn.textContent='Send →';
        alert('Failed to send: '+err.message);
      });
  });

  function fmtTs(ts){
    var d=new Date(ts);
    return d.toLocaleDateString('en',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',hour12:true});
  }
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  function renderHistory(){
    var hist=JSON.parse(localStorage.getItem('rc_sent')||'[]');
    if(!hist.length){histDiv.innerHTML='';return;}
    var html='<h2>Sent</h2>';
    hist.slice(0,6).forEach(function(m){
      var from=m.from?'<span class="hi-from">'+esc(m.from)+'</span>':'';
      html+='<div class="hist-item"><div>'+from+'<span class="hi-ts">'+fmtTs(m.ts)+'</span></div>'+
        '<div class="hi-text">'+esc(m.text)+'</div>'+
        '<button class="re-use" data-t="'+esc(m.text)+'">Re-use ↑</button></div>';
    });
    histDiv.innerHTML=html;
    histDiv.querySelectorAll('.re-use').forEach(function(b){
      b.addEventListener('click',function(){
        msgEl.value=b.dataset.t;
        msgEl.dispatchEvent(new Event('input'));
        msgEl.focus();
        window.scrollTo({top:0,behavior:'smooth'});
      });
    });
  }

  renderHistory();
})();
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){})})}</script>
</body>
</html>
